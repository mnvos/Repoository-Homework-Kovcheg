<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>LK HR Assistant - Admin</title>
  </head>
  <body>
    <h1>Knowledge Base - Topics</h1>
    <ul>
    {% for topic in topics %}
      <li><a href="/admin/topic/{{ topic.id }}{% if request.query_params.api_key %}?api_key={{ request.query_params.api_key }}{% endif %}">{{ topic.title }}</a> ({{ topic.questions|length }} questions)</li>
    {% endfor %}
    </ul>
    <h2>Add Topic</h2>
    <form method="post" action="/admin/topic/add">
      <label>Topic ID: <input name="id"></label><br>
      <label>Title: <input name="title"></label><br>
      <label>API Key: <input name="api_key" type="password"></label><br>
      <button type="submit">Add</button>
    </form>
  </body>
</html>
