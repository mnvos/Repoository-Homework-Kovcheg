<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Topic - {{ topic.title }}</title>
  </head>
  <body>
    <h1>{{ topic.title }}</h1>
    <h2>Questions</h2>
    <ul>
    {% for q in topic.questions %}
      <li>{{ q.title }} — <a href="/admin/question/{{ q.id }}/edit">Edit</a></li>
    {% endfor %}
    </ul>

    <h2>Add Question</h2>
    <form method="post" action="/admin/question/{{ topic.id }}/add">
      <label>Title: <input name="title"></label><br>
      <label>Patterns (comma separated): <input name="patterns"></label><br>
      <label>Keywords (comma separated): <input name="keywords"></label><br>
      <label>Answer: <textarea name="answer"></textarea></label><br>
      <label>Checklist (one per line): <textarea name="checklist"></textarea></label><br>
      <label>Review note: <input name="review"></label><br>
      <label>API Key: <input name="api_key" type="password"></label><br>
      <button type="submit">Add Question</button>
    </form>

    <p><a href="/admin{% if request.query_params.api_key %}?api_key={{ request.query_params.api_key }}{% endif %}">Back to topics</a></p>
  </body>
</html>
